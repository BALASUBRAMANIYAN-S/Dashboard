<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Details</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="attendance.css">
    <link rel="stylesheet" href="student-attendance.css">
    <link rel="stylesheet" href="../dist/output.css">
    <style>
        .details-container {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            padding: 2rem;
            margin-top: 1rem;
        }
        .details-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1.5rem;
        }
        .details-table th, .details-table td {
            padding: 1.25rem 1rem;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        .details-table th {
            background: #f8fafc;
            color: #64748b;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .details-table tbody tr:hover td {
            background: #f8fafc;
        }
        .status-badge {
            background-color: #f1f5f9;
            color: #475569;
            padding: 0.3rem 0.8rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }
    </style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css">
</head>
<body>
    <nav class="fixed-navbar">
        <h1 class="navbar-title" id="nav-title">Staff Details</h1>
        <div class="flex items-center gap-2">
            <label for="date-input" class="text-sm font-semibold text-slate-600">Date:</label>
            <input type="date" id="date-input" class="border border-slate-300 rounded p-1.5 text-sm outline-none focus:border-blue-500 text-slate-600 font-medium bg-white">
        </div>
    </nav>

    <div class="container">
        <nav class="breadcrumb">
            <a href="../index.html" class="back-link">Dashboard</a> 
            <span class="separator">/</span> 
            <a href="staff-attendance.html" class="back-link">Staff Attendance</a>
            <span id="breadcrumb-middle"></span>
            <span class="separator">/</span> 
            <span class="active-path">Details</span>
        </nav>

        <h1 class="main-title" id="page-title">Staff Details</h1>

        <div class="details-container">
            <table class="details-table">
                <thead>
                    <tr>
                        <th>Staff Code</th>
                        <th>Name</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Populated via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const mockNames = ["Aarav Patel", "Vihaan Singh", "Vivaan Sharma", "Ananya Gupta", "Diya Kumar", "Ishaan Verma", "Kavya Reddy"];
        const mockODReasons = ["Sports Event", "Hackathon", "Medical", "Paper Presentation", "Cultural Fest"];

        // Dummy functions to prevent console errors from the onchange attributes
        // function onProgramChange() {}
        function onFilterChange() {}
        function randomizeStats() {}

        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const type = params.get('type') || "Staff";
            const countParam = params.get('count');
            const dept = params.get('dept') || "All";
            let count = countParam ? parseInt(countParam) : 40; // Default to 40 if coming from department
            
            // Set Page Title and Breadcrumb
            if (countParam === null) {
                 document.getElementById('page-title').innerText = `${dept} Department - ${type} Staff`;
                 document.getElementById('breadcrumb-middle').innerHTML = `<span class="separator">/</span> <a href="staff-departments.html?type=${encodeURIComponent(type)}" class="back-link">${type} Departments</a>`;
            } else {
                 document.getElementById('page-title').innerText = `${type} Staff (${count})`;
            }
            
            // Generate mock rows
            const tbody = document.getElementById('table-body');
            const numStaff = count > 50 ? 25 : count; // limit mock rows
            
            if (numStaff === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#94a3b8; padding: 2rem;">No data available.</td></tr>';
                return;
            }

            const mockStatuses = ["Present", "Present", "Present", "Vacation", "CL", "Comp", "LOB"];

            for(let i=0; i<numStaff; i++) {
                const tr = document.createElement('tr');
                const empId = "EMP" + (Math.floor(Math.random() * 9000) + 1000);
                const name = mockNames[Math.floor(Math.random() * mockNames.length)];
                
                let details = '';
                if (countParam === null) {
                    // Coming from department click - random status
                    details = mockStatuses[Math.floor(Math.random() * mockStatuses.length)];
                } else {
                    // Coming from specific demographic stat
                    details = type.replace('Total ', '').replace('Teaching ', '').replace('Non-Teaching ', '');
                }
                
                tr.innerHTML = `
                    <td style="font-family: monospace; font-weight: 600; color: #475569; font-size: 1.05rem;">${empId}</td>
                    <td style="font-weight: 500; color: #0f172a; font-size: 1.05rem;">${name}</td>
                    <td><span class="status-badge">${details}</span></td>
                `;
                tbody.appendChild(tr);
            }
        });
    </script>
</body>
</html>
