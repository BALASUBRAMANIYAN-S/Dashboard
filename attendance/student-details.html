<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details - Attendance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="attendance.css">
    <link rel="stylesheet" href="student-attendance.css">
    <link rel="stylesheet" href="../dist/output.css">
    <style>
        .details-container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #f1f5f9;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .details-table {
            width: 100%;
            border-collapse: collapse;
        }

        .details-table th,
        .details-table td {
            padding: 1rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid #f1f5f9;
        }

        .details-table th {
            background-color: #f8fafc;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        .details-table tbody tr:hover {
            background-color: #f8fafc;
        }
        
        .details-table tbody tr:hover td {
            color: #334155;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
    <nav class="fixed-navbar">
        <h1 class="navbar-title" id="page-title">Student Details</h1>
    </nav>

    <div class="container mx-auto p-6 max-w-7xl">
        <nav class="breadcrumb mb-6 flex items-center text-sm font-medium text-slate-500">
            <a href="../index.html" class="back-link hover:text-blue-600 transition-colors">Dashboard</a> 
            <span class="separator mx-2">/</span> 
            <a href="student-attendance.html" class="back-link hover:text-blue-600 transition-colors">Student Attendance</a>
            <span class="separator mx-2">/</span> 
            <span class="active-path text-slate-800 font-semibold">Details</span>
        </nav>

        

        <!-- Stats Overview Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 mt-6">
            <div class="box disabled cursor-not-allowed text-center py-6" style="min-height: auto;">
                <div class="text-4xl font-bold text-emerald-600" id="stat-present">0</div>
                <div class="text-xs font-bold text-slate-500 uppercase tracking-wide mt-2">Present</div>
            </div>
            <div class="box disabled cursor-not-allowed text-center py-6" style="min-height: auto;">
                <div class="text-4xl font-bold text-rose-600" id="stat-absent">0</div>
                <div class="text-xs font-bold text-slate-500 uppercase tracking-wide mt-2">Absentees</div>
            </div>
            <div class="box disabled cursor-not-allowed text-center py-6" style="min-height: auto;">
                <div class="text-4xl font-bold text-orange-600" id="stat-od">0</div>
                <div class="text-xs font-bold text-orange-500 uppercase tracking-wide mt-2">ODs</div>
            </div>
        </div>

        <div class="details-container">
            <table class="details-table">
                <thead>
                    <tr>
                        <th>Roll No</th>
                        <th>Student Name</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Populated via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const mockNames = ["Aarav Patel", "Vihaan Singh", "Vivaan Sharma", "Ananya Gupta", "Diya Kumar", "Ishaan Verma", "Kavya Reddy", "Rohan Mehta", "Sanya Iyer", "Arjun Nair"];
        
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const type = params.get('type') || "Unknown";
            const dept = params.get('dept');
            const year = params.get('year') || "All Years";
            const section = params.get('section') || "";

            // Set Page Title
            if (dept && section) {
                document.getElementById('page-title').innerText = `${dept} - ${year} - ${section} Details`;
            } else {
                document.getElementById('page-title').innerText = `Student Details`;
            }

            // Dynamic Continuous Breadcrumb
            if (dept) {
                let typeLink = "ug-departments.html";
                if (type === "PG") typeLink = "pg-departments.html";
                if (type === "Scholar") typeLink = "scholars-departments.html";

                const breadcrumbNav = document.querySelector('.breadcrumb');
                breadcrumbNav.className = "breadcrumb mb-6 flex items-center text-sm font-medium text-slate-500";
                breadcrumbNav.innerHTML = `
                    <a href="../index.html" class="back-link hover:text-blue-600 transition-colors">Dashboard</a>
                    <span class="separator mx-2">/</span>
                    <a href="student-attendance.html" class="back-link hover:text-blue-600 transition-colors">Student Attendance</a>
                    <span class="separator mx-2">/</span>
                    <a href="${typeLink}" class="back-link hover:text-blue-600 transition-colors">${type} Departments</a>
                    <span class="separator mx-2">/</span>
                    <a href="year-overview.html?type=${type}&dept=${dept}" class="back-link hover:text-blue-600 transition-colors">${dept}</a>
                    <span class="separator mx-2">/</span>
                    <a href="section-overview.html?type=${type}&dept=${dept}&year=${year}" class="back-link hover:text-blue-600 transition-colors">${year}</a>
                    <span class="separator mx-2">/</span>
                    <span class="active-path text-slate-800 font-semibold">${section} Details</span>
                `;
            }
            
            // Generate mock rows
            const tbody = document.getElementById('table-body');
            const numStudents = 40; // generate 40 students for a section
            
            let presentCount = 0;
            let absentCount = 0;
            let odCount = 0;

            for(let i=0; i<numStudents; i++) {
                const tr = document.createElement('tr');
                const rollNo = "21" + (dept || "CS") + (Math.floor(Math.random() * 900) + 100);
                const name = mockNames[Math.floor(Math.random() * mockNames.length)];
                
                let rand = Math.random();
                let status = 'Present';
                let statusClass = 'bg-emerald-100 text-emerald-700';

                if (rand > 0.85) {
                    status = 'Absent';
                    statusClass = 'bg-rose-100 text-rose-700';
                    absentCount++;
                } else if (rand > 0.75) {
                    status = 'OD';
                    statusClass = 'bg-orange-100 text-orange-700';
                    odCount++;
                } else {
                    presentCount++;
                }
                
                tr.innerHTML = `
                    <td style="font-family: monospace; font-weight: 600; color: #475569; font-size: 1.05rem;">${rollNo}</td>
                    <td style="font-weight: 500; color: #0f172a; font-size: 1.05rem;">${name}</td>
                    <td><span class="status-badge ${statusClass}" style="padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase;">${status}</span></td>
                `;
                tbody.appendChild(tr);
            }

            document.getElementById('stat-present').innerText = presentCount;
            document.getElementById('stat-absent').innerText = absentCount;
            document.getElementById('stat-od').innerText = odCount;
        });
    </script>
</body>
</html>
